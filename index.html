  <script>
    tailwind.config = {

            'float-fast': 'float 4s ease-in-out infinite',
            'glow-pulse': 'glow-pulse 3s ease-in-out infinite',
            'shimmer': 'shimmer 2.5s linear infinite',
            'spin-slow': 'spin 8s linear infinite',
            'slide-up': 'slide-up 0.6s ease-out',
            'fade-scale': 'fade-scale 0.4s ease-out',
            'gradient-x': 'gradient-x 4s ease infinite',
            'morph-blob': 'morph-blob 8s ease-in-out infinite',
            'wave-rise': 'wave-rise 0.7s cubic-bezier(0.34,1.56,0.64,1) both',
            'slide-in-left': 'slide-in-left 0.6s cubic-bezier(0.34,1.56,0.64,1) both',
            'slide-in-right': 'slide-in-right 0.6s cubic-bezier(0.34,1.56,0.64,1) both',
            'flip-in': 'flip-in 0.5s ease-out both',
            'border-glow': 'border-glow 2s ease-in-out infinite',
            'particle-fly': 'particle-fly 1.2s ease-out both',
            'ripple': 'ripple 0.6s ease-out both',
            'text-reveal': 'text-reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both',
            'page-in': 'page-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both',
            'pulse-ring': 'pulse-ring 2s ease-out infinite',
            'count-up': 'count-up 0.6s cubic-bezier(0.34,1.56,0.64,1) both',
          },
          keyframes: {
            'aurora-shift': {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-16px)' },
            },
            'glow-pulse': {
              '0%, 100%': { opacity: '0.6', transform: 'scale(1)' },
              '50%': { opacity: '1', transform: 'scale(1.05)' },
            },
            'shimmer': {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            'slide-up': {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'fade-scale': {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            'gradient-x': {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },

            'morph-blob': {

            },
            'wave-rise': {
              '0%': { opacity: '0', transform: 'translateY(40px) scaleX(0.9)' },
              '100%': { opacity: '1', transform: 'translateY(0) scaleX(1)' },
            },
            'slide-in-left': {
              '0%': { opacity: '0', transform: 'translateX(-40px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            'slide-in-right': {
              '0%': { opacity: '0', transform: 'translateX(40px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            'flip-in': {
              '0%': { opacity: '0', transform: 'perspective(600px) rotateX(-30deg) translateY(20px)' },
              '100%': { opacity: '1', transform: 'perspective(600px) rotateX(0deg) translateY(0)' },
            },
            'border-glow': {

            },
            'particle-fly': {

              '100%': { opacity: '0', transform: 'translate(var(--tx,30px),var(--ty,-80px)) scale(0)' },
            },
            'ripple': {
              '0%': { opacity: '1', transform: 'scale(0)' },
              '100%': { opacity: '0', transform: 'scale(2.5)' },
            },
            'text-reveal': {
              '0%': { opacity: '0', transform: 'translateY(20px)', filter: 'blur(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)', filter: 'blur(0)' },
            },
            'page-in': {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'pulse-ring': {
              '0%': { opacity: '0.8', transform: 'scale(1)' },
              '100%': { opacity: '0', transform: 'scale(1.6)' },
            },
            'count-up': {
              '0%': { opacity: '0', transform: 'scale(0.7) translateY(10px)' },
              '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
          },
          backdropBlur: {
            xs: '2px',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/index.css">
  <style>
    @keyframes toast-in {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    :root {
      /* Default Theme (Teal) */
      --primary-50: #f0fdfa;
      --primary-100: #ccfbf1;
      --primary-200: #99f6e4;
      --primary-300: #5eead4;
      --primary-400: #2dd4bf;
      --primary-500: #14b8a6;
      --primary-600: #0d9488;
      --primary-700: #0f766e;
      --primary-800: #115e59;
      --primary-900: #134e4a;
      --primary-950: #042f2e;

      /* Design Tokens */
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --glow-amber: 0 0 30px rgba(245, 158, 11, 0.3);
      --glow-teal: 0 0 30px rgba(20, 184, 166, 0.3);
      --glow-rose: 0 0 30px rgba(244, 63, 94, 0.3);
      --gradient-aurora: linear-gradient(135deg, #f0fdf4 0%, #fef9f0 30%, #fdf2f8 60%, #eff6ff 100%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===================== AURORA BACKGROUND ===================== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 20% -5%, rgba(251, 191, 36, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(20, 184, 166, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 20%, rgba(244, 63, 94, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 10% 80%, rgba(99, 102, 241, 0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ===================== GLASSMORPHISM ===================== */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .glass-dark {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .glass-subtle {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* ===================== GRADIENT BORDER ===================== */
    .gradient-border {
      position: relative;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.5), rgba(20, 184, 166, 0.3), rgba(99, 102, 241, 0.4));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ===================== GLOW EFFECTS ===================== */
    .glow-amber {
      box-shadow: var(--glow-amber);
    }

    .glow-teal {
      box-shadow: var(--glow-teal);
    }

    .glow-rose {
      box-shadow: var(--glow-rose);
    }

    /* ===================== SHIMMER EFFECT ===================== */
    .shimmer-effect {
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.4) 50%,
          transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }

    /* ===================== GRADIENT TEXT ===================== */
    .gradient-text-amber {
      background: linear-gradient(135deg, #f59e0b, #ef4444, #f97316);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-x 4s ease infinite;
    }

    .gradient-text-teal {
      background: linear-gradient(135deg, #14b8a6, #3b82f6, #8b5cf6);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-x 4s ease infinite;
    }

    /* ===================== BENTO CARDS ===================== */
    .bento-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 0 rgba(255, 255, 255, 0.8) inset;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bento-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
    }

    /* ===================== PREMIUM BUTTONS ===================== */
    .btn-primary {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      font-weight: 700;
      border-radius: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.35);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::after {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(245, 158, 11, 0.5);
    }

    .btn-glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      font-weight: 600;
      border-radius: 14px;
      transition: all 0.3s ease;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    /* ===================== FLOATING ORBS ===================== */
    .orb {
      position: absolute;
      border-radius: 9999px;
      filter: blur(64px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    /* ===================== NAV ACTIVE STATE ===================== */
    .nav-item-active {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(249, 115, 22, 0.10));
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #d97706;
    }

    .nav-item-active-admin {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(99, 102, 241, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #a78bfa;
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    /* ===================== DARK MODE ===================== */
    .dark body {
      background-color: #030712;
    }

    .dark body::before {
      background:
        radial-gradient(ellipse 80% 60% at 20% -5%, rgba(251, 191, 36, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(20, 184, 166, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 20%, rgba(244, 63, 94, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 10% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 60%);
    }

    .dark .bento-card {
      background: rgba(15, 23, 42, 0.75);
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .dark .bento-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.65);
      border-color: rgba(255, 255, 255, 0.07);
    }

    .dark .bg-white {
      background-color: rgba(15, 23, 42, 0.8) !important;
      border-color: rgba(255, 255, 255, 0.07) !important;
      color: #e2e8f0;
    }

    .dark .text-slate-900 {
      color: #f1f5f9 !important;
    }

    .dark .text-slate-800 {
      color: #e2e8f0 !important;
    }

    .dark .text-slate-700 {
      color: #cbd5e1 !important;
    }

    .dark .text-slate-600 {
      color: #94a3b8 !important;
    }

    .dark .text-slate-500 {
      color: #94a3b8 !important;
    }

    .dark .bg-slate-50 {
      background-color: #030712 !important;
    }

    .dark .border-slate-100 {
      border-color: rgba(255, 255, 255, 0.06) !important;
    }

    .dark .border-slate-200 {
      border-color: rgba(255, 255, 255, 0.09) !important;
    }

    /* ===================== THEME OVERRIDES ===================== */
    /* Grey Mode */
    .grey body {
      background-color: #18181b !important;
      color: #e4e4e7 !important;
    }

    .grey .bento-card {
      background: rgba(39, 39, 42, 0.8) !important;
      border-color: rgba(255, 255, 255, 0.08) !important;
    }

    .grey .bg-slate-50,
    .grey .bg-slate-900 {
      background-color: #18181b !important;
    }

    .grey .bg-white {
      background-color: #27272a !important;
      border-color: #3f3f46 !important;
      color: #f4f4f5 !important;
    }

    /* Midnight Mode */
    .midnight body {
      background-color: #000 !important;
    }

    .midnight .bento-card {
      background: rgba(10, 10, 10, 0.9) !important;
      border-color: rgba(255, 255, 255, 0.04) !important;
    }

    .midnight .bg-slate-50,
    .midnight .bg-slate-900 {
      background-color: #000 !important;
    }

    .midnight .bg-white {
      background-color: #0a0a0a !important;
      border-color: #1a1a1a !important;
    }

    /* Sepia Mode */
    .sepia body {
      background-color: #fdf6e3 !important;
      color: #5c4b37 !important;
    }

    .sepia .bento-card {
      background: rgba(253, 246, 227, 0.9) !important;
      border-color: rgba(92, 75, 55, 0.15) !important;
    }

    .sepia .bg-slate-50,
    .sepia .bg-slate-900 {
      background-color: #fdf6e3 !important;
    }

    .sepia .bg-white {
      background-color: #fffbf0 !important;
      border-color: #e6dbb9 !important;
      color: #5c4b37 !important;
    }

    .sepia .text-slate-900,
    .sepia .text-slate-700,
    .sepia .text-slate-600 {
      color: #5c4b37 !important;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes aurora-shift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-16px);
      }
    }

    @keyframes glow-pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes slide-up {
      0% {
        opacity: 0;
        transform: translateY(24px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-scale {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes gradient-x {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ===================== UTILITY ===================== */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .animate-in {
      animation: slide-up 0.5s ease-out both;
    }

    .fade-in {
      animation: fade-scale 0.4s ease-out both;
    }

    /* Number shine on hover */
    .stat-val {
      font-family: 'Sora', sans-serif;
      font-variant-numeric: tabular-nums;
    }

    /* Liquid fill for water tracker */
    @keyframes liquid-fill {
      0% {
        transform: scaleX(0);
      }

      100% {
        transform: scaleX(1);
      }
    }

    .liquid-fill {
      transform-origin: left center;
      animation: liquid-fill 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* Neon border glow on focus */
    .input-glow:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3), 0 0 20px rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.5);
    }

    /* Card hover lift */
    .hover-lift {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    /* ===================== SCROLL REVEAL ===================== */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal-left.revealed {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal-right.revealed {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-reveal-scale {
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .scroll-reveal-scale.revealed {
      opacity: 1;
      transform: scale(1);
    }

    /* Stagger delays */
    .stagger-1 {
      transition-delay: 0.05s;
    }

    .stagger-2 {
      transition-delay: 0.12s;
    }

    .stagger-3 {
      transition-delay: 0.19s;
    }

    .stagger-4 {
      transition-delay: 0.26s;
    }

    .stagger-5 {
      transition-delay: 0.33s;
    }

    .stagger-6 {
      transition-delay: 0.40s;
    }

    /* ===================== PAGE TRANSITIONS ===================== */
    .page-transition-enter {
      animation: page-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ===================== MORPH BLOB ===================== */
    .morph-blob {
      animation: morph-blob 8s ease-in-out infinite;
    }

    /* ===================== PULSE RING ===================== */
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: inherit;
      border: 2px solid currentColor;
      opacity: 0;
      animation: pulse-ring 2s ease-out infinite;
    }

    /* ===================== ANIMATED GRADIENT BG ===================== */
    .gradient-bg-animated {
      background: linear-gradient(270deg, #f59e0b, #ec4899, #6366f1, #14b8a6);
      background-size: 300% 300%;
      animation: aurora-shift 6s ease infinite;
    }

    /* ===================== HOVER 3D TILT ===================== */
    .tilt-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }

    .tilt-card:hover {
      transform: perspective(800px) rotateX(-3deg) rotateY(3deg) translateY(-6px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.15);
    }

    /* ===================== ANIMATED UNDERLINE ===================== */
    .animated-underline {
      position: relative;
      display: inline-block;
    }

    .animated-underline::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #f59e0b, #f97316);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .animated-underline:hover::after {
      width: 100%;
    }

    /* ===================== BORDER GLOW ON HOVER ===================== */
    .glow-on-hover {
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .glow-on-hover:hover {
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.4), 0 8px 32px rgba(245, 158, 11, 0.2);
      transform: translateY(-2px);
    }

    /* ===================== FLOATING PARTICLES BG ===================== */
    @keyframes particle-drift {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.4;
      }

      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particle-drift linear infinite;
      pointer-events: none;
    }

    /* ===================== WAVE ANIMATION ===================== */
    @keyframes wave {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(1.5);
      }
    }

    .wave-bar {
      animation: wave 1.2s ease-in-out infinite;
      transform-origin: bottom;
    }

    /* ===================== PROGRESS RING ===================== */
    @keyframes ring-fill {
      from {
        stroke-dashoffset: var(--full);
      }

      to {
        stroke-dashoffset: var(--offset);
      }
    }

    .ring-animate {
      animation: ring-fill 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== STREAK FIRE ===================== */
    @keyframes flicker {

      0%,
      100% {
        transform: scaleY(1) skewX(0deg);
      }

      25% {
        transform: scaleY(1.05) skewX(-2deg);
      }

      50% {
        transform: scaleY(0.95) skewX(2deg);
      }

      75% {
        transform: scaleY(1.03) skewX(-1deg);
      }
    }

    .flame-flicker {
      animation: flicker 0.6s ease-in-out infinite;
      transform-origin: bottom center;
      display: inline-block;
    }

    /* ===================== BOUNCE IN ===================== */
    @keyframes bounce-in {
      0% {
        opacity: 0;
        transform: scale(0.3);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }

      70% {
        transform: scale(0.95);
      }

      100% {
        transform: scale(1);
      }
    }

    .bounce-in {
      animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== TYPEWRITER CURSOR ===================== */
    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #f59e0b;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }

    /* ===================== SHINE SWEEP ===================== */
    @keyframes shine-sweep {
      0% {
        left: -100%;
      }

      100% {
        left: 120%;
      }
    }

    .shine-on-hover {
      position: relative;
      overflow: hidden;
    }

    .shine-on-hover::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transform: skewX(-20deg);
      transition: none;
      pointer-events: none;
    }

    .shine-on-hover:hover::before {
      animation: shine-sweep 0.6s ease forwards;
    }

    /* ===================== NAV ACTIVE INDICATOR ===================== */
    @keyframes indicator-slide {
      from {
        transform: translateX(-8px) scaleY(0.5);
        opacity: 0;
      }

      to {
        transform: translateX(0) scaleY(1);
        opacity: 1;
      }
    }

    .nav-indicator {
      animation: indicator-slide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
