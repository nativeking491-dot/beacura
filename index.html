  <link rel="stylesheet" href="/index.css">
  <style>
    @keyframes toast-in {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    :root {
      /* === NEW DARK SPACE DESIGN SYSTEM === */
      /* Primary: Violet/Indigo */
      --primary-50: #f5f3ff;
      --primary-100: #ede9fe;
      --primary-200: #ddd6fe;
      --primary-300: #c4b5fd;
      --primary-400: #a78bfa;
      --primary-500: #8b5cf6;
      --primary-600: #7c3aed;
      --primary-700: #6d28d9;
      --primary-800: #5b21b6;
      --primary-900: #4c1d95;
      --primary-950: #2e1065;

      /* Design Tokens */
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --glow-violet: 0 0 30px rgba(139, 92, 246, 0.35);
      --glow-emerald: 0 0 30px rgba(16, 185, 129, 0.3);
      --glow-rose: 0 0 30px rgba(244, 63, 94, 0.3);
      --gradient-aurora: linear-gradient(135deg, #070711 0%, #0d0b1e 50%, #070f17 100%);

      /* Surface colors */
      --surface-0: #070711;
      --surface-1: #0e0d1f;
      --surface-2: #161529;
      --surface-3: #1e1c35;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--surface-0);
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===================== AURORA BACKGROUND ===================== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 20% -5%, rgba(139, 92, 246, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(16, 185, 129, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 20%, rgba(99, 102, 241, 0.09) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 10% 80%, rgba(6, 182, 212, 0.07) 0%, transparent 60%);
      pointer-events: none;
      animation: aurora-hue 20s ease infinite;
    }

    /* ===================== GLASSMORPHISM ===================== */
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .glass-dark {
      background: rgba(7, 7, 17, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .glass-subtle {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    /* ===================== GRADIENT BORDER ===================== */
    .gradient-border {
      position: relative;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.6), rgba(16, 185, 129, 0.3), rgba(99, 102, 241, 0.5));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ===================== GLOW EFFECTS ===================== */
    .glow-violet {
      box-shadow: var(--glow-violet);
    }

    .glow-emerald {
      box-shadow: var(--glow-emerald);
    }

    .glow-rose {
      box-shadow: var(--glow-rose);
    }

    /* Legacy aliases */
    .glow-amber {
      box-shadow: var(--glow-violet);
    }

    .glow-teal {
      box-shadow: var(--glow-emerald);
    }

    /* ===================== SHIMMER EFFECT ===================== */
    .shimmer-effect {
      background: linear-gradient(90deg, transparent 0%, rgba(139, 92, 246, 0.12) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }

    /* ===================== GRADIENT TEXT ===================== */
    .gradient-text-amber,
    .gradient-text-violet {
      background: linear-gradient(135deg, #a78bfa, #818cf8, #c084fc);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-x 4s ease infinite;
    }

    .gradient-text-teal,
    .gradient-text-emerald {
      background: linear-gradient(135deg, #34d399, #06b6d4, #818cf8);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-x 4s ease infinite;
    }

    /* ===================== BENTO CARDS ===================== */
    .bento-card {
      background: rgba(14, 13, 28, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bento-card:hover {
      transform: translateY(-3px);
      border-color: rgba(139, 92, 246, 0.2);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.15);
    }

    /* ===================== PREMIUM BUTTONS ===================== */
    .btn-primary {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      font-weight: 700;
      border-radius: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::after {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.55);
    }

    .btn-glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      font-weight: 600;
      border-radius: 14px;
      transition: all 0.3s ease;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(139, 92, 246, 0.4);
      transform: translateY(-2px);
    }

    /* ===================== FLOATING ORBS ===================== */
    .orb {
      position: absolute;
      border-radius: 9999px;
      filter: blur(64px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    /* ===================== NAV ACTIVE STATE ===================== */
    .nav-item-active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.18), rgba(99, 102, 241, 0.12));
      border: 1px solid rgba(139, 92, 246, 0.28);
      color: #c4b5fd;
    }

    .nav-item-active-admin {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(6, 182, 212, 0.12));
      border: 1px solid rgba(16, 185, 129, 0.28);
      color: #6ee7b7;
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.2);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 92, 246, 0.4);
    }

    /* ===================== DARK MODE (deep dark) ===================== */
    .dark body {
      background-color: #030309;
    }

    .dark body::before {
      background:
        radial-gradient(ellipse 80% 60% at 20% -5%, rgba(139, 92, 246, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(16, 185, 129, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 20%, rgba(99, 102, 241, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 10% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 60%);
    }

    .dark .bento-card {
      background: rgba(7, 7, 17, 0.9);
      border-color: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.6);
    }

    .dark .bento-card:hover {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(139, 92, 246, 0.12);
    }

    .dark .glass {
      background: rgba(7, 7, 17, 0.7);
      border-color: rgba(255, 255, 255, 0.06);
    }

    .dark .bg-white,
    .dark .bg-white\/80 {
      background-color: rgba(14, 13, 28, 0.9) !important;
      border-color: rgba(255, 255, 255, 0.07) !important;
      color: #e2e8f0 !important;
    }

    .dark .text-slate-900 {
      color: #f1f5f9 !important;
    }

    .dark .text-slate-800 {
      color: #e2e8f0 !important;
    }

    .dark .text-slate-700 {
      color: #cbd5e1 !important;
    }

    .dark .text-slate-600 {
      color: #94a3b8 !important;
    }

    .dark .text-slate-500 {
      color: #94a3b8 !important;
    }

    .dark .bg-slate-50 {
      background-color: #0e0d1f !important;
    }

    .dark .bg-slate-100 {
      background-color: #161529 !important;
    }

    .dark .border-slate-100 {
      border-color: rgba(255, 255, 255, 0.06) !important;
    }

    .dark .border-slate-200 {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }

    /* Light mode card overrides — use dark glass even in "light" mode */
    .bg-white {
      background-color: rgba(14, 13, 28, 0.85) !important;
      color: #e2e8f0;
    }

    .bg-slate-50 {
      background-color: #0e0d1f !important;
    }

    .bg-white\/80 {
      background-color: rgba(14, 13, 28, 0.8) !important;
    }

    .bg-white\/90 {
      background-color: rgba(14, 13, 28, 0.9) !important;
    }

    .text-slate-900 {
      color: #f1f5f9;
    }

    .text-slate-800 {
      color: #e2e8f0;
    }

    .text-slate-700 {
      color: #cbd5e1;
    }

    .text-slate-600 {
      color: #94a3b8;
    }

    .text-slate-500 {
      color: #64748b;
    }

    .border-slate-100 {
      border-color: rgba(255, 255, 255, 0.06) !important;
    }

    .border-slate-200 {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }

    /* ===================== THEME OVERRIDES ===================== */
    .grey body {
      background-color: #0c0c0e !important;
      color: #e4e4e7 !important;
    }

    .grey .bento-card {
      background: rgba(20, 20, 26, 0.9) !important;
      border-color: rgba(255, 255, 255, 0.07) !important;
    }

    .grey .bg-slate-50 {
      background-color: #0c0c0e !important;
    }

    .grey .bg-white {
      background-color: #18181b !important;
      border-color: #27272a !important;
      color: #f4f4f5 !important;
    }

    .midnight body {
      background-color: #000 !important;
    }

    .midnight .bento-card {
      background: rgba(5, 5, 10, 0.95) !important;
      border-color: rgba(255, 255, 255, 0.04) !important;
    }

    .midnight .bg-slate-50 {
      background-color: #000 !important;
    }

    .midnight .bg-white {
      background-color: #050508 !important;
      border-color: #0a0a10 !important;
    }

    .sepia body {
      background-color: #1a1209 !important;
      color: #e8d5b7 !important;
    }

    .sepia .bento-card {
      background: rgba(26, 18, 9, 0.9) !important;
      border-color: rgba(232, 213, 183, 0.1) !important;
    }

    .sepia .bg-slate-50 {
      background-color: #1a1209 !important;
    }

    .sepia .bg-white {
      background-color: #231608 !important;
      border-color: #3d2a10 !important;
      color: #e8d5b7 !important;
    }

    .sepia .text-slate-900,
    .sepia .text-slate-700,
    .sepia .text-slate-600 {
      color: #e8d5b7 !important;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes aurora-shift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-16px);
      }
    }

    @keyframes glow-pulse {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes slide-up {
      0% {
        opacity: 0;
        transform: translateY(24px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-scale {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes gradient-x {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes morph-blob {

      0%,
      100% {
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      }

      25% {
        border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
      }

      50% {
        border-radius: 50% 60% 30% 60% / 30% 40% 70% 50%;
      }

      75% {
        border-radius: 40% 50% 60% 30% / 70% 30% 50% 60%;
      }
    }

    @keyframes wave-rise {
      0% {
        opacity: 0;
        transform: translateY(40px) scaleX(0.9);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scaleX(1);
      }
    }

    @keyframes slide-in-left {
      0% {
        opacity: 0;
        transform: translateX(-40px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slide-in-right {
      0% {
        opacity: 0;
        transform: translateX(40px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes flip-in {
      0% {
        opacity: 0;
        transform: perspective(600px) rotateX(-30deg) translateY(20px);
      }

      100% {
        opacity: 1;
        transform: perspective(600px) rotateX(0deg) translateY(0);
      }
    }

    @keyframes border-glow {

      0%,
      100% {
        box-shadow: 0 0 5px rgba(139, 92, 246, 0.3), 0 0 20px rgba(139, 92, 246, 0.1);
      }

      50% {
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.6), 0 0 40px rgba(139, 92, 246, 0.3);
      }
    }

    @keyframes particle-fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx, 30px), var(--ty, -80px)) scale(0);
      }
    }

    @keyframes ripple {
      0% {
        opacity: 1;
        transform: scale(0);
      }

      100% {
        opacity: 0;
        transform: scale(2.5);
      }
    }

    @keyframes text-reveal {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(8px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes page-in {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse-ring {
      0% {
        opacity: 0.8;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.6);
      }
    }

    @keyframes count-up {
      0% {
        opacity: 0;
        transform: scale(0.7) translateY(10px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ===================== UTILITY ===================== */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .animate-in {
      animation: slide-up 0.5s ease-out both;
    }

    .fade-in {
      animation: fade-scale 0.4s ease-out both;
    }

    .stat-val {
      font-family: 'Sora', sans-serif;
      font-variant-numeric: tabular-nums;
    }

    @keyframes liquid-fill {
      0% {
        transform: scaleX(0);
      }

      100% {
        transform: scaleX(1);
      }
    }

    .liquid-fill {
      transform-origin: left center;
      animation: liquid-fill 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    .input-glow:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.35), 0 0 24px rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.6) !important;
    }

    .hover-lift {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* ===================== SCROLL REVEAL ===================== */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal-left.revealed {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scroll-reveal-right.revealed {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-reveal-scale {
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .scroll-reveal-scale.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .stagger-1 {
      transition-delay: 0.05s;
    }

    .stagger-2 {
      transition-delay: 0.12s;
    }

    .stagger-3 {
      transition-delay: 0.19s;
    }

    .stagger-4 {
      transition-delay: 0.26s;
    }

    .stagger-5 {
      transition-delay: 0.33s;
    }

    .stagger-6 {
      transition-delay: 0.40s;
    }

    /* ===================== PAGE TRANSITIONS ===================== */
    .page-transition-enter {
      animation: page-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ===================== MORPH BLOB ===================== */
    .morph-blob {
      animation: morph-blob 8s ease-in-out infinite;
    }

    /* ===================== PULSE RING ===================== */
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: inherit;
      border: 2px solid currentColor;
      opacity: 0;
      animation: pulse-ring 2s ease-out infinite;
    }

    /* ===================== ANIMATED GRADIENT BG ===================== */
    .gradient-bg-animated {
      background: linear-gradient(270deg, #8b5cf6, #6366f1, #06b6d4, #10b981);
      background-size: 300% 300%;
      animation: aurora-shift 6s ease infinite;
    }

    /* ===================== HOVER 3D TILT ===================== */
    .tilt-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }

    .tilt-card:hover {
      transform: perspective(800px) rotateX(-3deg) rotateY(3deg) translateY(-6px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
    }

    /* ===================== ANIMATED UNDERLINE ===================== */
    .animated-underline {
      position: relative;
      display: inline-block;
    }

    .animated-underline::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #8b5cf6, #6366f1);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .animated-underline:hover::after {
      width: 100%;
    }

    /* ===================== BORDER GLOW ON HOVER ===================== */
    .glow-on-hover {
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .glow-on-hover:hover {
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.4), 0 8px 32px rgba(139, 92, 246, 0.25);
      transform: translateY(-2px);
    }

    /* ===================== FLOATING PARTICLES ===================== */
    @keyframes particle-drift {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.5;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particle-drift linear infinite;
      pointer-events: none;
    }

    /* ===================== WAVE ANIMATION ===================== */
    @keyframes wave {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(1.5);
      }
    }

    .wave-bar {
      animation: wave 1.2s ease-in-out infinite;
      transform-origin: bottom;
    }

    /* ===================== PROGRESS RING ===================== */
    @keyframes ring-fill {
      from {
        stroke-dashoffset: var(--full);
      }

      to {
        stroke-dashoffset: var(--offset);
      }
    }

    .ring-animate {
      animation: ring-fill 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== STREAK FIRE ===================== */
    @keyframes flicker {

      0%,
      100% {
        transform: scaleY(1) skewX(0deg);
      }

      25% {
        transform: scaleY(1.05) skewX(-2deg);
      }

      50% {
        transform: scaleY(0.95) skewX(2deg);
      }

      75% {
        transform: scaleY(1.03) skewX(-1deg);
      }
    }

    .flame-flicker {
      animation: flicker 0.6s ease-in-out infinite;
      transform-origin: bottom center;
      display: inline-block;
    }

    /* ===================== BOUNCE IN ===================== */
    @keyframes bounce-in {
      0% {
        opacity: 0;
        transform: scale(0.3);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }

      70% {
        transform: scale(0.95);
      }

      100% {
        transform: scale(1);
      }
    }

    .bounce-in {
      animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== TYPEWRITER CURSOR ===================== */
    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #8b5cf6;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      border-radius: 2px;
    }

    /* ===================== SHINE SWEEP ===================== */
    @keyframes shine-sweep {
      0% {
        left: -100%;
      }

      100% {
        left: 120%;
      }
    }

    .shine-on-hover {
      position: relative;
      overflow: hidden;
    }

    .shine-on-hover::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: skewX(-20deg);
      transition: none;
      pointer-events: none;
    }

    .shine-on-hover:hover::before {
      animation: shine-sweep 0.6s ease forwards;
    }

    /* ===================== NAV ACTIVE INDICATOR ===================== */
    @keyframes indicator-slide {
      from {
        transform: translateX(-8px) scaleY(0.5);
        opacity: 0;
      }

      to {
        transform: translateX(0) scaleY(1);
        opacity: 1;
      }
    }

    .nav-indicator {
      animation: indicator-slide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== TEXT SHIMMER ===================== */
    @keyframes text-shimmer-move {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .text-shimmer {
      background: linear-gradient(90deg, currentColor 0%, rgba(196, 181, 253, 0.9) 40%, currentColor 60%, rgba(139, 92, 246, 0.8) 80%, currentColor 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: text-shimmer-move 3s linear infinite;
    }

    /* ===================== ELASTIC POP ===================== */
    @keyframes elastic-pop {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(20px);
      }

      60% {
        opacity: 1;
        transform: scale(1.06) translateY(-4px);
      }

      80% {
        transform: scale(0.97) translateY(2px);
      }

      100% {
        transform: scale(1) translateY(0);
      }
    }

    .elastic-pop {
      animation: elastic-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== CARD 3D TILT ===================== */
    .card-3d {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* ===================== AURORA HUE ROTATION ===================== */
    @keyframes aurora-hue {
      0% {
        filter: hue-rotate(0deg);
      }

      50% {
        filter: hue-rotate(20deg);
      }

      100% {
        filter: hue-rotate(0deg);
      }
    }

    /* ===================== CURSOR SPOTLIGHT ===================== */
    .spotlight-card {
      position: relative;
      overflow: hidden;
    }

    .spotlight-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(300px circle at var(--x, 50%) var(--y, 50%), rgba(139, 92, 246, 0.1), transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .spotlight-card:hover::after {
      opacity: 1;
    }

    /* ===================== MAGNETIC BUTTON ===================== */
    .magnetic-btn {
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      display: inline-flex;
    }

    /* ===================== BENTO GLOW ===================== */
    .bento-glow-violet:hover,
    .bento-glow-amber:hover {
      box-shadow: 0 12px 40px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.18) !important;
    }

    .bento-glow-emerald:hover,
    .bento-glow-teal:hover {
      box-shadow: 0 12px 40px rgba(16, 185, 129, 0.22), 0 0 0 1px rgba(16, 185, 129, 0.15) !important;
    }

    .bento-glow-indigo:hover {
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.22), 0 0 0 1px rgba(99, 102, 241, 0.18) !important;
    }

    .bento-glow-rose:hover {
      box-shadow: 0 12px 40px rgba(244, 63, 94, 0.22), 0 0 0 1px rgba(244, 63, 94, 0.15) !important;
    }

    /* ===================== MARQUEE ===================== */
    @keyframes marquee-scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee-scroll 30s linear infinite;
    }

    .marquee-track:hover {
      animation-play-state: paused;
    }

    /* ===================== WORD REVEAL ===================== */
    @keyframes word-reveal {
      0% {
        opacity: 0;
        transform: translateY(28px) rotateX(-20deg);
        filter: blur(4px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg);
        filter: blur(0);
      }
    }

    .word-reveal {
      opacity: 0;
      display: inline-block;
      animation: word-reveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ===================== HEX BADGE ===================== */
    .hex-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hex-badge {
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
    }

    .hex-badge:hover {
      transform: scale(1.15) rotate(5deg);
      filter: brightness(1.2);
    }

    /* ===================== BOTTOM NAV PILL ===================== */
    @keyframes pill-slide {
      from {
        opacity: 0.4;
        transform: scaleX(0.7);
      }

      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    .bottom-nav-pill {
      animation: pill-slide 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ===================== MESSAGE SLIDE-INS ===================== */
    @keyframes msg-in-left {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes msg-in-right {
      from {
        opacity: 0;
        transform: translateX(16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .msg-in-left {
      animation: msg-in-left 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .msg-in-right {
      animation: msg-in-right 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ===================== SENTIMENT BAR ===================== */
    .sentiment-bar {
      transition: background 0.8s ease, box-shadow 0.8s ease;
    }

    /* ===================== NEON BORDER PULSE ===================== */
    @keyframes neon-border {

      0%,
      100% {
        border-color: rgba(139, 92, 246, 0.3);
        box-shadow: 0 0 8px rgba(139, 92, 246, 0.2);
      }

      50% {
        border-color: rgba(139, 92, 246, 0.7);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      }
    }

    .neon-border {
      animation: neon-border 2.5s ease-in-out infinite;
    }

    /* ===================== GRID OVERLAY ===================== */
    .grid-overlay {
      background-image: linear-gradient(rgba(139, 92, 246, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ===================== REHABILITATION ANIMATIONS ===================== */

    @keyframes healing-pulse {
      0%, 100% {
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.2), 0 0 40px rgba(16, 185, 129, 0.05);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 24px rgba(16, 185, 129, 0.45), 0 0 80px rgba(16, 185, 129, 0.15);
        transform: scale(1.03);
      }
    }

    .healing-pulse {
      animation: healing-pulse 3s ease-in-out infinite;
    }

    @keyframes body-glow {
      0%, 100% {
        filter: drop-shadow(0 0 4px var(--glow-color, rgba(139,92,246,0.3)));
      }
      50% {
        filter: drop-shadow(0 0 16px var(--glow-color, rgba(139,92,246,0.6)));
      }
    }

    .body-glow {
      animation: body-glow 2.5s ease-in-out infinite;
    }

    @keyframes nerve-flow {
      0% {
        stroke-dashoffset: 100;
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      100% {
        stroke-dashoffset: -100;
        opacity: 0;
      }
    }

    .nerve-flow {
      stroke-dasharray: 8 16;
      animation: nerve-flow 2s linear infinite;
    }

    @keyframes rep-pop {
      0% {
        transform: scale(1);
      }
      30% {
        transform: scale(1.4);
      }
      50% {
        transform: scale(0.9);
      }
      70% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .rep-pop {
      animation: rep-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes hold-breathe {
      0%, 100% {
        transform: scale(0.85);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    .hold-breathe {
      animation: hold-breathe 4s ease-in-out infinite;
    }

    @keyframes phase-slide {
      0% {
        opacity: 0;
        transform: translateX(-20px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .phase-slide {
      animation: phase-slide 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes pain-gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .pain-gradient-animated {
      background-size: 200% 200%;
      animation: pain-gradient 3s ease infinite;
    }

    @keyframes anatomy-highlight {
      0%, 100% {
        opacity: 0.35;
        filter: blur(8px);
      }
      50% {
        opacity: 0.65;
        filter: blur(12px);
      }
    }

    .anatomy-highlight {
      animation: anatomy-highlight 3s ease-in-out infinite;
    }

    @keyframes progress-orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .progress-orbit {
      animation: progress-orbit 8s linear infinite;
    }

    @keyframes recovery-fill {
      from { stroke-dashoffset: var(--full, 283); }
      to { stroke-dashoffset: var(--offset, 0); }
    }

    .recovery-ring-animate {
      animation: recovery-fill 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* Pain severity color utilities */
    .pain-glow-low {
      --glow-color: rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 16px rgba(16, 185, 129, 0.3);
    }

    .pain-glow-medium {
      --glow-color: rgba(245, 158, 11, 0.4);
      box-shadow: 0 0 16px rgba(245, 158, 11, 0.3);
    }

    .pain-glow-high {
      --glow-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 0 16px rgba(239, 68, 68, 0.3);
    }

    /* Rehab card variant */
    .rehab-card {
      background: rgba(14, 13, 28, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.1);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(16, 185, 129, 0.06) inset;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .rehab-card:hover {
      transform: translateY(-3px);
      border-color: rgba(16, 185, 129, 0.25);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(16, 185, 129, 0.18);
    }

    /* Body region highlight on SVG */
    .body-region {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .body-region:hover {
      filter: brightness(1.3);
      transform-origin: center;
    }

    .body-region.active {
      animation: body-glow 2s ease-in-out infinite;
    }

    .body-region.injured {
      --glow-color: rgba(239, 68, 68, 0.5);
      animation: body-glow 1.5s ease-in-out infinite;
    }

    .body-region.recovering {
      --glow-color: rgba(245, 158, 11, 0.4);
      animation: body-glow 2.5s ease-in-out infinite;
    }

    .body-region.healthy {
      --glow-color: rgba(16, 185, 129, 0.3);
    }

    /* Counter bounce for rep counting */
    @keyframes counter-bounce {
      0% { transform: scale(1); }
      20% { transform: scale(1.3); }
      40% { transform: scale(0.95); }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .counter-bounce {
      animation: counter-bounce 0.35s ease-out;
    }

    /* Gradient text for rehab */
    .gradient-text-healing {
      background: linear-gradient(135deg, #10b981, #06b6d4, #8b5cf6);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-x 4s ease infinite;
    }

    /* Pain slider track */
    .pain-track {
      background: linear-gradient(90deg, #10b981, #84cc16, #eab308, #f97316, #ef4444);
      border-radius: 999px;
      height: 8px;
    }

    .pain-track input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      cursor: pointer;
    }

    .pain-track input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 3px rgba(139,92,246,0.3);
      cursor: grab;
      transition: box-shadow 0.2s ease;
    }

    .pain-track input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 0 0 4px rgba(139,92,246,0.5);
    }

    .pain-track input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
      transform: scale(1.1);
    }
  </style>

  <script>
    // Global mouse-tracking for spotlight-card and card-3d tilt
    document.addEventListener('mousemove', function (e) {
      document.querySelectorAll('.spotlight-card').forEach(function (card) {
        var r = card.getBoundingClientRect();
        card.style.setProperty('--x', (e.clientX - r.left) + 'px');
        card.style.setProperty('--y', (e.clientY - r.top) + 'px');
      });
      document.querySelectorAll('.card-3d').forEach(function (card) {
        var r = card.getBoundingClientRect();
        var cx = r.left + r.width / 2;
        var cy = r.top + r.height / 2;
        var dx = (e.clientX - cx) / r.width;
        var dy = (e.clientY - cy) / r.height;
        card.style.transform = 'perspective(900px) rotateY(' + (dx * 10) + 'deg) rotateX(' + (-dy * 8) + 'deg) translateZ(4px)';
      });
    });
    document.addEventListener('mouseleave', function () {
      document.querySelectorAll('.card-3d').forEach(function (card) {
        card.style.transform = 'perspective(900px) rotateY(0) rotateX(0) translateZ(0)';
      });
    }, true);
  </script>
</head>
